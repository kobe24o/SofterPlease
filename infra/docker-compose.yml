version: '3.9'
services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../:/app
    command: bash -lc "pip install -r backend/requirements.txt && uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  web:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../web:/app
    command: bash -lc "python -m http.server 5173 --bind 0.0.0.0"
    ports:
      - "5173:5173"
