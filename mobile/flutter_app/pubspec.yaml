name: softerplease
version: 2.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  
  # 网络请求
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 音频处理
  record: ^5.0.4
  audioplayers: ^5.2.1
  permission_handler: ^11.1.0
  
  # 图表
  fl_chart: ^0.66.0
  
  # UI组件
  flutter_screenutil: ^5.9.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  
  # 工具
  intl: ^0.18.1
  uuid: ^4.2.2
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  
  # 推送通知
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0
  
  # 深度链接
  uni_links: ^0.5.1
  
  # 分享
  share_plus: ^7.2.1
  
  # 图片选择
  image_picker: ^1.0.7
  
  # 路径
  path_provider: ^2.1.1
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.5
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
